<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Bright, Vibrant Green Owl (Duolingo Style) -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89e219;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58cc02;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="3" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Body -->
  <rect x="25" y="30" width="70" height="70" rx="35" fill="url(#bodyGrad)" filter="url(#softShadow)" />
  
  <!-- "Wings" (Simple side bumps) -->
  <path d="M 25 65 Q 15 65 15 80" stroke="#58cc02" stroke-width="8" fill="none" stroke-linecap="round" />
  <path d="M 95 65 Q 105 65 105 80" stroke="#58cc02" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Face Area (Lighter Green) -->
  <circle cx="45" cy="60" r="22" fill="#CEF05D" />
  <circle cx="75" cy="60" r="22" fill="#CEF05D" />

  <!-- Eyes -->
  <circle cx="45" cy="60" r="14" fill="white" />
  <circle cx="75" cy="60" r="14" fill="white" />
  <circle cx="45" cy="60" r="6" fill="#4B4B4B" />
  <circle cx="75" cy="60" r="6" fill="#4B4B4B" />
  <circle cx="43" cy="58" r="2" fill="white" />
  <circle cx="73" cy="58" r="2" fill="white" />

  <!-- Beak -->
  <path d="M 55 75 L 65 75 L 60 85 Z" fill="#FF9600" />
  
  <!-- Feet -->
  <circle cx="45" cy="100" r="6" fill="#FF9600" />
  <circle cx="75" cy="100" r="6" fill="#FF9600" />

  <!-- Graduation Cap -->
  <g transform="translate(60, 25) rotate(-10)">
    <rect x="-20" y="0" width="40" height="4" fill="#1CB0F6" />
    <path d="M -25 0 L 0 -10 L 25 0 L 0 10 Z" fill="#3C3C3C" />
    <line x1="0" y1="0" x2="15" y2="15" stroke="#FFC800" stroke-width="2" />
    <circle cx="15" cy="15" r="3" fill="#FFC800" />
  </g>
</svg>
